<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entidades - Micro ERP</title>
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/entidades.css">
</head>
<body>
  <header>
    <div class="brand">Micro ERP</div>
    <div class="user-area">
      <a href="/pages/dashboard">Dashboard</a>
      <a href="/logout">Sair</a>
    </div>
  </header>

  <main>
    <div class="card">
      <div class="page-header">
        <div>
          <h1>Entidades</h1>
          <p>Cadastro, edição e status.</p>
        </div>

        <div>
          <a href="/pages/dashboard" class="btn-secondary">Voltar</a>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Formulário de Entidade</h2>
      <form id="entidade-form">
        <div class="form-grid">
          <div>
            <label class="form-label" for="tipo_entidade">Tipo</label>
            <select id="tipo_entidade" class="form-select" required>
              <option value="">Selecione</option>
              <option value="CLIENTE">Cliente</option>
              <option value="FORNECEDOR">Fornecedor</option>
            </select>
          </div>

          <div>
            <label class="form-label" for="nome_razao_social">Nome / Razão Social</label>
            <input id="nome_razao_social" class="form-input" type="text" required>
          </div>

          <div>
            <label class="form-label" for="nome_fantasia">Nome Fantasia</label>
            <input id="nome_fantasia" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="cpf_cnpj">CPF/CNPJ</label>
            <input id="cpf_cnpj" class="form-input" type="text" required>
          </div>

          <div>
            <label class="form-label" for="inscricao_estadual">Inscrição Estadual</label>
            <input id="inscricao_estadual" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="email">E-mail</label>
            <input id="email" class="form-input" type="email">
          </div>

          <div>
            <label class="form-label" for="telefone">Telefone</label>
            <input id="telefone" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="cep">CEP</label>
            <input id="cep" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="logradouro">Logradouro</label>
            <input id="logradouro" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="numero">Número</label>
            <input id="numero" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="bairro">Bairro</label>
            <input id="bairro" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="cidade">Cidade</label>
            <input id="cidade" class="form-input" type="text">
          </div>

          <div>
            <label class="form-label" for="uf">UF</label>
            <input id="uf" class="form-input" type="text" maxlength="2">
          </div>
        </div>

        <div class="form-actions">
          <button id="submit-button" type="submit" class="btn-primary">Salvar</button>
          <button id="cancel-edit-button" type="button" class="btn-secondary" style="display:none;">Cancelar edição</button>
        </div>

        <p id="form-status"></p>
      </form>
    </div>

    <div class="card">
      <h2>Lista de Entidades</h2>
      <p id="entidades-status"></p>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>ID</th>
              <th>Tipo</th>
              <th>Nome / Razão Social</th>
              <th>CPF/CNPJ</th>
              <th>E-mail</th>
              <th>Telefone</th>
              <th>Status</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="entidades-tbody">
            <tr>
              <td colspan="8">Carregando...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </main>

  <script src="/scripts/api.js"></script>
  <script src="/scripts/entidades.js"></script>
</body>
</html>
