<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Micro ERP</title>
  <link rel="stylesheet" href="/styles/global.css">
  <link rel="stylesheet" href="/styles/auth.css">
</head>
<body class="auth-page">
  <div class="auth-card">
    <h1 class="auth-title">Login</h1>

    <form id="login-form">
      <label class="auth-label" for="email">E-mail</label>
      <input class="auth-input" type="email" id="email" required>

      <label class="auth-label" for="password">Senha</label>
      <input class="auth-input" type="password" id="password" required>

      <button class="auth-button" type="submit">Entrar</button>
    </form>

    <p id="login-status"></p>
  </div>

  <script src="/scripts/api.js"></script>
  <script src="/scripts/login.js"></script>
</body>
</html>
